<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tab Stack</title>
<style>
  :root{
    --page-bg-light:#f4f1ea;
    --page-bg-dark:#1b211c;
    --ink-light:#24352b;
    --ink-dark:#dce8e0;
    --dur:420ms;
    --ease:cubic-bezier(.4,0,.2,1);
  }
  *{box-sizing:border-box;}
  html,body{height:100%;margin:0;}
  body{
    background:var(--page-bg);
    font-family:'Iowan Old Style','Palatino Linotype',Palatino,Georgia,serif;
    overflow:hidden;
  }
  body[data-theme="light"]{ --page-bg:var(--page-bg-light); }
  body[data-theme="dark"]{ --page-bg:var(--page-bg-dark); }

  .shell{
    position:relative;
    height:100vh;
    width:100vw;
    overflow:hidden;
  }

  .stack-title{
    position:absolute;
    top:18px;
    left:24px;
    margin:0;
    font-size:.78rem;
    font-weight:600;
    letter-spacing:.14em;
    text-transform:uppercase;
    opacity:.72;
    z-index:20000;
    pointer-events:none;
  }

  #frameHost{
    position:absolute;
    overflow-y:auto;
    overflow-x:hidden;
    background:transparent;
    transition:
      top var(--dur) var(--ease), left var(--dur) var(--ease),
      width var(--dur) var(--ease), height var(--dur) var(--ease);
    -webkit-overflow-scrolling:touch;
  }
  #frameHost::-webkit-scrollbar{ width:9px; }
  #frameHost::-webkit-scrollbar-thumb{ background:rgba(120,120,120,.35); border-radius:6px; }

  iframe{
    width:100%;
    border:0;
    display:block;
    background:transparent;
  }

  .tab{
    position:absolute;
    top:0; left:0;
    height:var(--row-h);
    transition:
      transform var(--dur) var(--ease),
      width var(--dur) var(--ease),
      height var(--dur) var(--ease);
    transition-delay:var(--delay,0ms);
    will-change:transform;
    cursor:pointer;
  }
  .tab.is-active{ cursor:default; }
  .tab svg{
    display:block;
    width:100%;
    height:100%;
    overflow:visible;
    filter:drop-shadow(3px 5px 6px rgba(0,0,0,.26));
  }
  .tab path{ transition:fill var(--dur) var(--ease), stroke var(--dur) var(--ease); }
  .tab h2{
    position:absolute;
    top:0; left:0; right:0;
    height:var(--flap-h);
    margin:0;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:0 10px;
    font-size:.86rem;
    font-weight:500;
    letter-spacing:.01em;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    pointer-events:none;
    transition:color var(--dur) var(--ease);
  }
  .tab.is-active h2{ font-weight:700; font-size:.92rem; }
</style>
</head>
<body>
<div class="shell" id="shell">
  <h1 class="stack-title" id="stackTitle"></h1>
  <div id="tabLayer"></div>
  <div id="frameHost">
    <iframe id="contentFrame" title="Tab content"></iframe>
  </div>

  <svg width="0" height="0" style="position:absolute">
    <defs>
      <filter id="handDrawn" x="-30%" y="-30%" width="160%" height="160%">
        <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="7" result="noise"/>
        <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.1"/>
      </filter>
    </defs>
  </svg>
</div>

<script>
(function(){

  /* ---------- vector helpers ---------- */
  const sub=(a,b)=>({x:a.x-b.x,y:a.y-b.y});
  const add=(a,b)=>({x:a.x+b.x,y:a.y+b.y});
  const scale=(a,s)=>({x:a.x*s,y:a.y*s});
  const len=(a)=>Math.hypot(a.x,a.y);
  const normalize=(a)=>{ const l=len(a)||1; return {x:a.x/l,y:a.y/l}; };

  function roundedPolygonPath(points, radius){
    const d=[]; const n=points.length;
    const radii = Array.isArray(radius) ? radius : points.map(()=>radius);
    for(let i=0;i<n;i++){
      const prev=points[(i-1+n)%n], curr=points[i], next=points[(i+1)%n];
      const toPrev=sub(prev,curr), toNext=sub(next,curr);
      const r=Math.min(radii[i], len(toPrev)/2, len(toNext)/2);
      const p1=add(curr,scale(normalize(toPrev),r));
      const p2=add(curr,scale(normalize(toNext),r));
      d.push(i===0?`M ${p1.x.toFixed(2)} ${p1.y.toFixed(2)}`:`L ${p1.x.toFixed(2)} ${p1.y.toFixed(2)}`);
      d.push(`Q ${curr.x.toFixed(2)} ${curr.y.toFixed(2)} ${p2.x.toFixed(2)} ${p2.y.toFixed(2)}`);
    }
    d.push('Z');
    return d.join(' ');
  }

  /* Classic folder silhouette: a rounded-rect body with a trapezoid tab
     flap protruding from its top edge, merged into ONE outline.
     flapW/flapH are FIXED pixel sizes (same physical tab size whether the
     folder is collapsed or fully open) rather than proportional, so the
     tab reads as one consistent object regardless of body size. flapX is
     the left edge of the flap in local coordinates (drives left/center/
     right placement). */
  function folderPath(w,h,flapX,flapW,flapH,leanPx,cornerR,concaveR){
    const fx0=flapX, fx1=flapX+flapW;
    const pts=[
      {x:0,           y:h},     // body bottom-left
      {x:0,           y:flapH}, // body top-left
      {x:fx0,         y:flapH}, // concave: flap base, left
      {x:fx0+leanPx,  y:0},     // flap top-left
      {x:fx1-leanPx,  y:0},     // flap top-right
      {x:fx1,         y:flapH}, // concave: flap base, right
      {x:w,           y:flapH}, // body top-right
      {x:w,           y:h},     // body bottom-right
    ];
    const radii=[cornerR,cornerR,concaveR,cornerR,cornerR,concaveR,cornerR,cornerR];
    return roundedPolygonPath(pts,radii);
  }

  function darken(hex, amt){
    const n = hex.replace('#','');
    const r = parseInt(n.substring(0,2),16), g = parseInt(n.substring(2,4),16), b = parseInt(n.substring(4,6),16);
    const f = (c)=>Math.max(0,Math.round(c*(1-amt)));
    return `rgb(${f(r)},${f(g)},${f(b)})`;
  }

  /* ---------- state ---------- */
  let manifest=null;
  let activeIndex=0;
  let prevIndex=0;
  const theme = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark':'light';
  document.body.dataset.theme=theme;

  const shell=document.getElementById('shell');
  const tabLayer=document.getElementById('tabLayer');
  const frameHost=document.getElementById('frameHost');
  const iframe=document.getElementById('contentFrame');
  const stackTitle=document.getElementById('stackTitle');

  const lerp=(a,b,t)=>a+(b-a)*t;
  const clamp=(v,lo,hi)=>Math.max(lo,Math.min(hi,v));

  function resolveBg(){
    return manifest.colors[theme] || manifest.colors.light;
  }

  /* ---------- layout ----------
     Header (behind, above the open tab): each tab further back is TALLER
     than the one in front of it, all sharing the same bottom edge (flush
     against the open tab's top) -- so only a growing sliver of each shows
     above the one in front.
     Footer (in front, below the open tab): uniform height, simply stepped
     downward, overlapping the open tab's bottom edge by a small fixed
     amount so it reads as "in front of" it without covering its content
     (the open tab always renders on top regardless).
     The open tab takes whatever vertical space is left between the two. */
  function computeLayout(){
    const L=manifest.layout;
    const n=manifest.tabs.length;
    const vw=shell.clientWidth, vh=shell.clientHeight;
    const baseMargin=32; // pulled in further from the edge to leave room for the larger corner radius
    const titleOffset=46;

    const headerCount=activeIndex;           // tabs BEHIND (before) active
    const footerCount=n-1-activeIndex;        // tabs IN FRONT (after) active

    const headerSpan = headerCount>0 ? (L.collapsedBaseH + (headerCount-1)*L.headerGrowthPx) : 0;
    const openTop = titleOffset + headerSpan;

    const footerSpan = footerCount>0 ? ((footerCount-1)*L.footerStepPx + L.collapsedBaseH) : 0;
    const openBottomSeam = vh - footerSpan; // where the footer stack's front edge sits

    // The folder shape isn't solid all the way to its own top -- only the
    // flap is; the BODY's solid fill only starts flapHeightPx down (that's
    // the notch the flap sits in). A neighbour has to overlap past that
    // point, not just past the bounding-box edge, or there's a sliver where
    // neither shape's solid fill covers -- a visible gap.
    const bridgePx = L.flapHeightPx + 6;
    const frameHostBottom = openBottomSeam + bridgePx; // how far the SCROLLABLE content area extends past the seam -- kept modest, unlike the shape height below

    // Every tab -- open or collapsed -- renders at the SAME constant
    // height, tall enough to reach well past the bottom of the viewport
    // from any valid top position. Only its Y position (translateY)
    // differs between tabs and changes when switching active tab. This is
    // deliberate: height can't be smoothly morphed (the SVG path shape
    // would distort mid-transition since its 'd' attribute snaps instantly
    // while width/height CSS-transition independently), so making height
    // constant means there is nothing to animate except a plain
    // translateY -- which also means every shape's body always extends
    // far past any seam, so a gap is impossible by construction, both at
    // rest and mid-animation.
    const BASELINE_H = vh;

    const positions={left:0, center:.5, right:1};
    const flapAnchor=(pos,containerW)=>{
      const frac=positions[pos] ?? .5;
      const x=frac*containerW - L.flapWidthPx/2;
      const edgeClearance=L.cornerRadiusPx+8; // keep the flap clear of the tab's own edge so its corner radius isn't clipped
      return clamp(x, edgeClearance, containerW - L.flapWidthPx - edgeClearance);
    };

    const layout=manifest.tabs.map((tab,i)=>{
      // Width is static -- every tab spans the full screen width minus a
      // small margin. The margin grows by 1px per layer as you step back
      // from front (i=n-1) to back (i=0), so tabs nest very slightly
      // rather than dramatically narrowing. This is independent of
      // header/footer/open state.
      const stepsFromFront = (n-1) - i;
      const margin = baseMargin + stepsFromFront;
      const width = vw - margin*2;
      const x = margin;

      // z-index is a fixed property of each tab's permanent stack
      // position -- it never changes when a different tab is opened.
      const zIndex = i;

      if(i===activeIndex){
        return { tab,i,isOpen:true, x, y:openTop, width, height:BASELINE_H, frameHostH:frameHostBottom-openTop, zIndex, delayMs:0 };
      }

      // Only the Y position (where the visible peeking sliver starts)
      // differs between collapsed tabs; the peek-height formulas below are
      // used purely to compute that Y, not the actual rendered height.
      let y;
      if(i<activeIndex){
        // header: further back = starts higher up, all sharing the same
        // reference bottom line (which reaches past the open tab's own
        // body-start, not just its top edge, so there's no gap sliver).
        const k=activeIndex-i;
        const peekHeight=L.collapsedBaseH+(k-1)*L.headerGrowthPx;
        y=(openTop+bridgePx)-peekHeight;
      }else{
        // footer: uniform peek spacing, stepped downward starting exactly
        // at the seam -- it's the OPEN tab that reaches down behind this
        // one (see frameHostBottom above), not the other way round.
        const j=i-(activeIndex+1);
        y=openBottomSeam + j*L.footerStepPx;
      }

      const distFromSource=Math.abs(i-prevIndex);
      const delayMs=Math.min(distFromSource,8)*L.staggerStepMs;

      return {tab,i,isOpen:false,x,y,width,height:BASELINE_H,zIndex,delayMs};
    });

    return {layout, flapAnchor};
  }

  /* ---------- render ---------- */
  let tabEls=[];

  function buildTabEls(){
    tabLayer.innerHTML='';
    tabEls=manifest.tabs.map((tab,i)=>{
      const el=document.createElement('div');
      el.className='tab';
      el.dataset.index=i;

      const ns='http://www.w3.org/2000/svg';
      const svg=document.createElementNS(ns,'svg');
      const path=document.createElementNS(ns,'path');
      svg.appendChild(path);
      el.appendChild(svg);

      const h2=document.createElement('h2');
      h2.textContent=tab.label;
      el.appendChild(h2);

      el.addEventListener('click',()=>setActive(i));
      tabLayer.appendChild(el);
      return {el,svg,path,h2};
    });
  }

  function paint(){
    const L=manifest.layout;
    const {layout,flapAnchor}=computeLayout();

    stackTitle.textContent=manifest.title||'';

    layout.forEach(({tab,i,isOpen,x,y,width,height,frameHostH,zIndex,delayMs})=>{
      const {el,path,h2}=tabEls[i];
      el.style.setProperty('--row-h', height+'px');
      el.style.setProperty('--flap-h', L.flapHeightPx+'px');
      el.style.setProperty('--delay', delayMs+'ms');
      el.style.width=width+'px';
      el.style.zIndex=zIndex;
      el.style.transform=`translate(${x}px, ${y}px)`;
      el.classList.toggle('is-active', isOpen);

      const flapX=flapAnchor(tab.position, width);
      const leanPx=L.flapHeightPx*Math.tan(L.flapAngleDeg*Math.PI/180);
      const d=folderPath(width, height, flapX, L.flapWidthPx, L.flapHeightPx, leanPx, L.cornerRadiusPx, L.cornerRadiusPx);
      path.setAttribute('d',d);

      const bg=resolveBg();
      path.setAttribute('fill',bg);
      path.setAttribute('stroke',darken(bg,0.32));
      path.setAttribute('stroke-width','1.6');
      path.setAttribute('stroke-linejoin','round');
      path.style.filter='url(#handDrawn)';

      h2.style.left=flapX+'px';
      h2.style.width=L.flapWidthPx+'px';
      h2.style.right='auto';

      if(isOpen){
        const fhX=x, fhW=width;
        const fhY=y+L.flapHeightPx, fhH=frameHostH-L.flapHeightPx;
        frameHost.style.left=fhX+'px';
        frameHost.style.top=fhY+'px';
        frameHost.style.width=fhW+'px';
        frameHost.style.height=fhH+'px';
        frameHost.style.borderRadius=L.cornerRadiusPx+'px';
        frameHost.style.zIndex=zIndex;
      }
    });
  }

  function setActive(i){
    if(i===activeIndex) return;
    prevIndex=activeIndex;
    activeIndex=i;
    paint();
    loadActiveFrame();
  }

  /* ---------- iframe height sync (same-origin) ---------- */
  let ro=null;
  function resizeFrame(){
    try{
      const doc=iframe.contentWindow.document;
      iframe.style.height=doc.documentElement.scrollHeight+'px';
    }catch(e){ /* ignore during navigation */ }
  }
  function loadActiveFrame(){
    const tab=manifest.tabs[activeIndex];
    iframe.src=tab.url;
    iframe.onload=()=>{
      resizeFrame();
      if(ro) ro.disconnect();
      ro=new ResizeObserver(resizeFrame);
      try{ ro.observe(iframe.contentWindow.document.body); }catch(e){}
    };
  }

  /* ---------- boot ---------- */
  fetch('manifest.json').then(r=>r.json()).then(m=>{
    manifest=m;
    buildTabEls();
    paint();
    loadActiveFrame();
  });

  window.addEventListener('resize',()=>{ if(manifest) paint(); });

})();
</script>
</body>
</html>
