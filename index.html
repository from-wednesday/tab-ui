<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tab Stack</title>
<style>
  :root{
    --page-bg-light:#f4f1ea;
    --page-bg-dark:#1b211c;
    --ink-light:#24352b;
    --ink-dark:#dce8e0;
    --dur:420ms;
    --press-dur:90ms;
    --ease:cubic-bezier(.18,.9,.24,1.08);
  }
  *{box-sizing:border-box;}
  html,body{height:100%;margin:0;}
  body{
    background:var(--page-bg);
    font-family:'Iowan Old Style','Palatino Linotype',Palatino,Georgia,serif;
    overflow:hidden;
  }
  body[data-theme="light"]{ --page-bg:var(--page-bg-light); }
  body[data-theme="dark"]{ --page-bg:var(--page-bg-dark); }
  .shell{
    position:relative;
    height:100vh;
    width:100vw;
    overflow:hidden;
  }
  .stack-title{
    position:absolute;
    top:18px;
    left:24px;
    margin:0;
    font-size:.78rem;
    font-weight:600;
    letter-spacing:.14em;
    text-transform:uppercase;
    opacity:.72;
    z-index:20000;
    pointer-events:none;
  }
  .tab{
    position:absolute;
    top:0; left:0;
    height:var(--row-h);
    transition:
      transform var(--tab-dur,var(--dur)) var(--ease) var(--tab-delay,0ms),
      width var(--tab-dur,var(--dur)) var(--ease) var(--tab-delay,0ms),
      height var(--tab-dur,var(--dur)) var(--ease) var(--tab-delay,0ms);
    will-change:transform;
    -webkit-backface-visibility:hidden;
    backface-visibility:hidden;
    pointer-events:none;
  }
  .tab svg{
    display:block;
    width:100%;
    height:100%;
    overflow:visible;
    pointer-events:none;
  }
  .tab path{
    transition:fill var(--dur) var(--ease), stroke var(--dur) var(--ease);
    pointer-events:visiblePainted;
    cursor:pointer;
  }
  .tab h2{
    position:absolute;
    top:0; left:0; right:0;
    min-height:var(--flap-h);
    margin:0;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:6px 10px;
    font-size:.86rem;
    font-weight:500;
    letter-spacing:.01em;
    white-space:normal;
    line-height:1.2;
    overflow:visible;
    pointer-events:none;
    transition:color var(--dur) var(--ease);
  }
  .frameHost{
    position:absolute;
    left:0;
    overflow-y:auto;
    overflow-x:hidden;
    background:transparent;
    opacity:0;
    pointer-events:none;
    transition:opacity 140ms ease;
    -webkit-overflow-scrolling:touch;
  }
  .frameHost.is-visible{
    opacity:1;
    pointer-events:auto;
  }
  .frameHost::-webkit-scrollbar{ width:9px; }
  .frameHost::-webkit-scrollbar-thumb{ background:rgba(120,120,120,.35); border-radius:6px; }
  iframe{
    width:100%;
    border:0;
    display:block;
    background:transparent;
  }
</style>
</head>
<body>
<div class="shell" id="shell">
  <h1 class="stack-title" id="stackTitle"></h1>
  <div id="tabLayer"></div>
</div>
<script>
(function(){
  const sub=(a,b)=>({x:a.x-b.x,y:a.y-b.y});
  const add=(a,b)=>({x:a.x+b.x,y:a.y+b.y});
  const scale=(a,s)=>({x:a.x*s,y:a.y*s});
  const len=(a)=>Math.hypot(a.x,a.y);
  const normalize=(a)=>{ const l=len(a)||1; return {x:a.x/l,y:a.y/l}; };
  function roundedPolygonPath(points, radius){
    const d=[]; const n=points.length;
    const radii = Array.isArray(radius) ? radius : points.map(()=>radius);
    for(let i=0;i<n;i++){
      const prev=points[(i-1+n)%n], curr=points[i], next=points[(i+1)%n];
      const toPrev=sub(prev,curr), toNext=sub(next,curr);
      const r=Math.min(radii[i], len(toPrev)/2, len(toNext)/2);
      const p1=add(curr,scale(normalize(toPrev),r));
      const p2=add(curr,scale(normalize(toNext),r));
      d.push(i===0?`M ${p1.x.toFixed(2)} ${p1.y.toFixed(2)}`:`L ${p1.x.toFixed(2)} ${p1.y.toFixed(2)}`);
      d.push(`Q ${curr.x.toFixed(2)} ${curr.y.toFixed(2)} ${p2.x.toFixed(2)} ${p2.y.toFixed(2)}`);
    }
    d.push('Z');
    return d.join(' ');
  }
  function folderPath(w,h,flapX,flapW,flapH,leanPx,cornerR,concaveR){
    const fx0=flapX, fx1=flapX+flapW;
    const pts=[
      {x:0,           y:h},
      {x:0,           y:flapH},
      {x:fx0,         y:flapH},
      {x:fx0+leanPx,  y:0},
      {x:fx1-leanPx,  y:0},
      {x:fx1,         y:flapH},
      {x:w,           y:flapH},
      {x:w,           y:h},
    ];
    const radii=[cornerR,cornerR,concaveR,cornerR,cornerR,concaveR,cornerR,cornerR];
    return roundedPolygonPath(pts,radii);
  }
  function darken(hex, amt){
    const n = hex.replace('#','');
    const r = parseInt(n.substring(0,2),16), g = parseInt(n.substring(2,4),16), b = parseInt(n.substring(4,6),16);
    const f = (c)=>Math.max(0,Math.round(c*(1-amt)));
    return `rgb(${f(r)},${f(g)},${f(b)})`;
  }
  let manifest=null;
  let activeIndex=0;
  let prevIndex=0;
  let pressedIndex=null;
  let transitioningFrom=null;
  let transitionTimer=null;
  const pressOffsetPx=4;
  const cascadeStepMs=120;
  const transitionMs=420;
  const pressMs=90;
  const parallaxPx=18;
  const theme = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark':'light';
  document.body.dataset.theme=theme;
  const shell=document.getElementById('shell');
  const tabLayer=document.getElementById('tabLayer');
  const stackTitle=document.getElementById('stackTitle');
  function resolveBg(){
    return manifest.colors[theme] || manifest.colors.light;
  }
  function resolvePageBg(){
    return getComputedStyle(document.body).backgroundColor;
  }
  function computeLayout(){
    const L=manifest.layout;
    const n=manifest.tabs.length;
    const vw=shell.clientWidth, vh=shell.clientHeight;
    const baseMargin=32;
    const titleOffset=18;
    const headerCount=activeIndex;
    const footerCount=n-1-activeIndex;
    const peekStepPx = L.peekStepPx;
    const headerSpan = headerCount*peekStepPx;
    const openTop = titleOffset + headerSpan;
    const bottomMarginPx = (L.flapHeightPx - peekStepPx) + 12;
    const footerSpan = footerCount*peekStepPx;
    const openBottomSeam = (vh - bottomMarginPx) - footerSpan;
    const frameHostBottom = openBottomSeam + L.flapHeightPx + 6;
    const BASELINE_H = vh;
    const flapCascadeX=(i,containerW)=>{
      const edgeClearance=L.cornerRadiusPx+8;
      const usableW=containerW - L.flapWidthPx - edgeClearance*2;
      const slots=Math.max(1, Math.floor(usableW / L.flapStepPx) + 1);
      const slot=(i + 1) % slots;
      return edgeClearance + slot*L.flapStepPx;
    };
    const layout=manifest.tabs.map((tab,i)=>{
      const stepsFromFront = (n-1) - i;
      const margin = baseMargin + stepsFromFront;
      const width = vw - margin*2;
      const x = margin;
      const zIndex = i;
      if(i===activeIndex){
        return {tab,i,isOpen:true,x,y:openTop,width,height:BASELINE_H,frameHostH:frameHostBottom-openTop,zIndex};
      }
      let y;
      if(i<activeIndex){
        const k=activeIndex-i;
        y=openTop - k*peekStepPx;
      }else{
        const j=i-(activeIndex+1);
        y=openBottomSeam + j*peekStepPx;
      }
      return {tab,i,isOpen:false,x,y,width,height:BASELINE_H,zIndex};
    });
    return {layout, flapCascadeX};
  }
  let tabEls=[];
  let lastLayout=[];
  function shouldShowPane(i){
    return i===activeIndex || i===transitioningFrom;
  }
  function startPress(i,e,path){
    if(!manifest || i===activeIndex) return;
    pressedIndex=i;
    try{ path.setPointerCapture(e.pointerId); }catch(err){}
    paint({mode:'press'});
  }
  function finishPress(i,activate){
    if(pressedIndex!==i) return;
    pressedIndex=null;
    if(activate && i!==activeIndex){
      setActive(i);
    }else{
      paint();
    }
  }
  function buildTabEls(){
    tabLayer.innerHTML='';
    tabEls=manifest.tabs.map((tab,i)=>{
      const el=document.createElement('div');
      el.className='tab';
      el.dataset.index=i;
      const ns='http://www.w3.org/2000/svg';
      const svg=document.createElementNS(ns,'svg');
      const path=document.createElementNS(ns,'path');
      path.addEventListener('pointerdown',(e)=>{
        e.preventDefault();
        e.stopPropagation();
        startPress(i,e,path);
      });
      path.addEventListener('pointerup',(e)=>{
        e.preventDefault();
        e.stopPropagation();
        finishPress(i,true);
      });
      path.addEventListener('pointercancel',(e)=>{
        e.stopPropagation();
        finishPress(i,false);
      });
      path.addEventListener('click',(e)=>{
        e.preventDefault();
        e.stopPropagation();
      });
      path.addEventListener('mouseenter',()=>{
        shell.style.cursor=i!==activeIndex?'pointer':'default';
      });
      path.addEventListener('mouseleave',()=>{
        shell.style.cursor='default';
      });
      svg.appendChild(path);
      el.appendChild(svg);
      const h2=document.createElement('h2');
      h2.textContent=tab.label;
      el.appendChild(h2);
      const frameHost=document.createElement('div');
      frameHost.className='frameHost';
      const iframe=document.createElement('iframe');
      iframe.title=tab.label+' content';
      frameHost.appendChild(iframe);
      el.appendChild(frameHost);
      tabLayer.appendChild(el);
      return {el,svg,path,h2,frameHost,iframe,ro:null,loaded:false,lastPaneH:null};
    });
  }
  function cascadeDelayFor(i, mode){
    if(mode==='press') return 0;
    const source = transitioningFrom ?? activeIndex;
    if(i===source) return 0;
    return Math.min(Math.abs(i-source),8)*cascadeStepMs;
  }
  function paneHeightFor(i, frameHostH, L){
    if(i===activeIndex && frameHostH){
      const h=frameHostH-L.flapHeightPx;
      tabEls[i].lastPaneH=h;
      return h;
    }
    return tabEls[i].lastPaneH || Math.max(0, shell.clientHeight-L.flapHeightPx);
  }
  function paint(opts={}){
    const mode=opts.mode || 'normal';
    const L=manifest.layout;
    const {layout,flapCascadeX}=computeLayout();
    let maxDelay=0;
    stackTitle.textContent=manifest.title||'';
    layout.forEach(({tab,i,isOpen,x,y,width,height,frameHostH,zIndex})=>{
      const {el,svg,path,h2,frameHost}=tabEls[i];
      const pressDy=(i===pressedIndex && i!==activeIndex) ? (i<activeIndex ? -pressOffsetPx : pressOffsetPx) : 0;
      const delay=cascadeDelayFor(i,mode);
      maxDelay=Math.max(maxDelay,delay);
      el.style.setProperty('--tab-delay', delay+'ms');
      el.style.setProperty('--tab-dur', (mode==='press' && i===pressedIndex ? pressMs : transitionMs)+'ms');
      el.style.setProperty('--row-h', height+'px');
      el.style.setProperty('--flap-h', L.flapHeightPx+'px');
      el.style.width=width+'px';
      el.style.zIndex=zIndex;
      el.style.transform=`translate(${x}px, ${y+pressDy}px) translateZ(0)`;
      el.classList.toggle('is-active', isOpen);
      const flapX=flapCascadeX(i, width);
      const leanPx=L.flapHeightPx*Math.tan(L.flapAngleDeg*Math.PI/180);
      const d=folderPath(width, height, flapX, L.flapWidthPx, L.flapHeightPx, leanPx, L.cornerRadiusPx, L.cornerRadiusPx);
      const tabBg=resolveBg();
      const pageBg=resolvePageBg();
      const textColour=darken(tabBg,0.80);
      document.body.style.color=textColour;
      stackTitle.style.color=textColour;
      h2.style.color=textColour;
      path.setAttribute('d',d);
      path.setAttribute('fill',tabBg);
      path.setAttribute('stroke',pageBg);
      path.setAttribute('stroke-width','1.6');
      path.setAttribute('stroke-linejoin','round');
      svg.style.filter=i===0?'drop-shadow(1px -1px 2px rgba(0,0,0,.055))':'drop-shadow(1px -2px 4px rgba(0,0,0,.10))';
      h2.style.left=flapX+'px';
      h2.style.width=L.flapWidthPx+'px';
      h2.style.right='auto';
      frameHost.style.top=L.flapHeightPx+'px';
      frameHost.style.width='100%';
      frameHost.style.height=paneHeightFor(i,frameHostH,L)+'px';
      frameHost.style.borderRadius=L.cornerRadiusPx+'px';
      frameHost.classList.toggle('is-visible', shouldShowPane(i));
      if(shouldShowPane(i)) loadFrame(i);
    });
    lastLayout=layout.map(({tab,i,x,y,width,zIndex})=>({i,x,y,width,flapX:flapCascadeX(i,width),zIndex}));
    return maxDelay + transitionMs;
  }
  function primeParallaxStart(previousLayout){
    const previousByIndex=new Map(previousLayout.map(t=>[t.i,t]));
    const L=manifest.layout;
    const {layout}=computeLayout();
    layout.forEach(({i,x,y,width,height})=>{
      const item=tabEls[i];
      const old=previousByIndex.get(i);
      if(!item || !old) return;
      const dy=y-old.y;
      const travel=Math.abs(dy);
      const dir=dy===0 ? 0 : dy/Math.abs(dy);
      const depth=Math.min(1.8, 1 + travel/Math.max(1,L.peekStepPx)*0.08);
      const kick=dir===0 ? 0 : -dir*parallaxPx*depth;
      item.el.style.transition='none';
      item.el.style.setProperty('--row-h', height+'px');
      item.el.style.setProperty('--flap-h', L.flapHeightPx+'px');
      item.el.style.setProperty('--tab-dur', transitionMs+'ms');
      item.el.style.setProperty('--tab-delay','0ms');
      item.el.style.width=width+'px';
      item.el.style.transform=`translate(${x}px, ${old.y+kick}px) translateZ(0)`;
    });
    tabLayer.offsetHeight;
    tabEls.forEach(item=>{ item.el.style.transition=''; });
  }
  function setActive(i){
    if(i===activeIndex) return;
    if(transitionTimer) clearTimeout(transitionTimer);
    const previousLayout=lastLayout.map(t=>({...t}));
    prevIndex=activeIndex;
    transitioningFrom=activeIndex;
    activeIndex=i;
    primeParallaxStart(previousLayout);
    requestAnimationFrame(()=>{
      const totalMs=paint({mode:'switch'});
      transitionTimer=setTimeout(()=>{
        transitioningFrom=null;
        paint();
      },totalMs+80);
    });
  }
  function applyFrameTextColour(i){
    try{
      const item=tabEls[i];
      const doc=item.iframe.contentWindow.document;
      const textColour=darken(resolveBg(),0.80);
      doc.documentElement.style.color=textColour;
      if(doc.body) doc.body.style.color=textColour;
    }catch(e){ }
  }
  function measureFrameContent(i){
    const doc=tabEls[i].iframe.contentWindow.document;
    const body=doc.body;
    const html=doc.documentElement;
    return Math.ceil(Math.max(
      body ? body.scrollHeight : 0,
      body ? body.offsetHeight : 0,
      html ? html.scrollHeight : 0,
      html ? html.offsetHeight : 0
    ));
  }
  function resizeFrame(i){
    try{
      const item=tabEls[i];
      const contentHeight=measureFrameContent(i);
      item.iframe.style.height=contentHeight+'px';
      const hostHeight=item.frameHost.clientHeight;
      const needsScroll=contentHeight>hostHeight+1;
      item.frameHost.style.overflowY=needsScroll?'auto':'hidden';
      if(!needsScroll) item.frameHost.scrollTop=0;
      applyFrameTextColour(i);
    }catch(e){ }
  }
  function loadFrame(i){
    const item=tabEls[i];
    if(item.loaded) return;
    const tab=manifest.tabs[i];
    item.loaded=true;
    item.frameHost.scrollTop=0;
    item.frameHost.style.overflowY='hidden';
    item.iframe.style.height='0px';
    item.iframe.onload=()=>{
      resizeFrame(i);
      requestAnimationFrame(()=>{
        resizeFrame(i);
        requestAnimationFrame(()=>resizeFrame(i));
      });
      if(item.ro) item.ro.disconnect();
      item.ro=new ResizeObserver(()=>resizeFrame(i));
      try{
        item.ro.observe(item.iframe.contentWindow.document.body);
        item.ro.observe(item.iframe.contentWindow.document.documentElement);
      }catch(e){}
    };
    item.iframe.src=tab.url;
  }
  function tabAtPoint(px,py){
    const L=manifest.layout;
    const sorted=[...lastLayout].sort((a,b)=>b.zIndex-a.zIndex);
    for(const t of sorted){
      const lx=px-t.x, ly=py-t.y;
      if(lx<0||lx>t.width||ly<0) continue;
      if(ly<L.flapHeightPx){
        if(lx>=t.flapX && lx<=t.flapX+L.flapWidthPx) return t.i;
      }else{
        return t.i;
      }
    }
    return null;
  }
  shell.addEventListener('click',(e)=>{
    if(!manifest) return;
    const rect=shell.getBoundingClientRect();
    const i=tabAtPoint(e.clientX-rect.left, e.clientY-rect.top);
    if(i!==null) setActive(i);
  });
  shell.addEventListener('mousemove',(e)=>{
    if(!manifest) return;
    const rect=shell.getBoundingClientRect();
    const i=tabAtPoint(e.clientX-rect.left, e.clientY-rect.top);
    shell.style.cursor=(i!==null && i!==activeIndex) ? 'pointer' : 'default';
  });
  fetch('manifest.json').then(r=>r.json()).then(m=>{
    manifest=m;
    buildTabEls();
    paint();
  }).catch(err=>{
    shell.innerHTML=`<div style="padding:24px;font-family:system-ui,sans-serif;color:#a33;">
      <strong>Failed to load the tab stack.</strong><br>${(err&&err.message)||err}
    </div>`;
  });
  window.addEventListener('error', (e)=>{
    if(shell.querySelector('.tab')) return;
    shell.innerHTML=`<div style="padding:24px;font-family:system-ui,sans-serif;color:#a33;">
      <strong>Script error:</strong><br>${e.message} (${e.filename}:${e.lineno})
    </div>`;
  });
  window.addEventListener('resize',()=>{ if(manifest) paint(); });
})();
</script>
</body>
</html>
