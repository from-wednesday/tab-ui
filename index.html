<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tab Stack</title>
<style>
  :root{
    --page-bg-light:#f4f1ea;
    --page-bg-dark:#1b211c;
    --ink-light:#24352b;
    --ink-dark:#dce8e0;
    --dur:420ms;
    --ease:cubic-bezier(.4,0,.2,1);
  }
  *{box-sizing:border-box;}
  html,body{height:100%;margin:0;}
  body{
    background:var(--page-bg);
    color:var(--ink);
    font-family:'Iowan Old Style','Palatino Linotype',Palatino,Georgia,serif;
    overflow:hidden;
  }
  body[data-theme="light"]{ --page-bg:var(--page-bg-light); --ink:var(--ink-light); }
  body[data-theme="dark"]{ --page-bg:var(--page-bg-dark); --ink:var(--ink-dark); }

  .shell{
    position:relative;
    height:100vh;
    width:100vw;
    overflow:hidden;
  }

  .stack-title{
    position:absolute;
    top:18px;
    left:24px;
    margin:0;
    font-size:.78rem;
    font-weight:600;
    letter-spacing:.14em;
    text-transform:uppercase;
    color:var(--ink);
    opacity:.72;
    z-index:1000;
    pointer-events:none;
  }

  .scroll-zone{
    position:absolute;
    left:0; right:0;
    overflow-y:auto;
    overflow-x:hidden;
    transition:top var(--dur) var(--ease), bottom var(--dur) var(--ease);
    -webkit-overflow-scrolling:touch;
  }
  .scroll-zone::-webkit-scrollbar{ width:9px; }
  .scroll-zone::-webkit-scrollbar-thumb{ background:rgba(120,120,120,.35); border-radius:6px; }

  iframe{
    width:100%;
    border:0;
    display:block;
    background:transparent;
  }

  .tab{
    position:absolute;
    top:0; left:0;
    height:var(--row-h);
    transition:
      transform var(--dur) var(--ease),
      width var(--dur) var(--ease);
    transition-delay:var(--delay,0ms);
    will-change:transform;
    cursor:pointer;
  }
  .tab svg{
    display:block;
    width:100%;
    height:100%;
    overflow:visible;
  }
  .tab .tab-fill{ transition:fill var(--dur) var(--ease); }
  .tab .tab-stroke{ transition:stroke var(--dur) var(--ease); }
  .tab h2{
    position:absolute;
    top:0; left:0;
    height:100%;
    margin:0;
    display:flex;
    align-items:center;
    padding-left:20px;
    padding-right:28px;
    font-size:.92rem;
    font-weight:500;
    letter-spacing:.01em;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    pointer-events:none;
    transition:color var(--dur) var(--ease), opacity var(--dur) var(--ease);
  }
  .tab.is-active h2{ font-weight:700; }
</style>
</head>
<body>
<div class="shell" id="shell">
  <h1 class="stack-title" id="stackTitle"></h1>
  <div class="scroll-zone" id="scrollZone">
    <iframe id="contentFrame" title="Tab content"></iframe>
  </div>
  <div id="tabLayer"></div>

  <svg width="0" height="0" style="position:absolute">
    <defs>
      <filter id="handDrawn" x="-30%" y="-30%" width="160%" height="160%">
        <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="7" result="noise"/>
        <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.1"/>
      </filter>
    </defs>
  </svg>
</div>

<script>
(function(){

  /* ---------- vector helpers ---------- */
  const sub=(a,b)=>({x:a.x-b.x,y:a.y-b.y});
  const add=(a,b)=>({x:a.x+b.x,y:a.y+b.y});
  const scale=(a,s)=>({x:a.x*s,y:a.y*s});
  const len=(a)=>Math.hypot(a.x,a.y);
  const normalize=(a)=>{ const l=len(a)||1; return {x:a.x/l,y:a.y/l}; };

  function roundedPolygonPath(points, radius){
    const d=[]; const n=points.length;
    for(let i=0;i<n;i++){
      const prev=points[(i-1+n)%n], curr=points[i], next=points[(i+1)%n];
      const toPrev=sub(prev,curr), toNext=sub(next,curr);
      const r=Math.min(radius, len(toPrev)/2, len(toNext)/2);
      const p1=add(curr,scale(normalize(toPrev),r));
      const p2=add(curr,scale(normalize(toNext),r));
      d.push(i===0?`M ${p1.x.toFixed(2)} ${p1.y.toFixed(2)}`:`L ${p1.x.toFixed(2)} ${p1.y.toFixed(2)}`);
      d.push(`Q ${curr.x.toFixed(2)} ${curr.y.toFixed(2)} ${p2.x.toFixed(2)} ${p2.y.toFixed(2)}`);
    }
    d.push('Z');
    return d.join(' ');
  }

  /* tab "flap" shape: base full width, top narrower by the lean, all four
     corners rounded. This is the reusable folder-tab silhouette. */
  function tabPath(w,h,leanPx,radius){
    const pts=[
      {x:0,y:h},         // bottom-left
      {x:leanPx,y:0},    // top-left
      {x:w-leanPx,y:0},  // top-right
      {x:w,y:h},         // bottom-right
    ];
    return roundedPolygonPath(pts,radius);
  }

  /* ---------- state ---------- */
  let manifest=null;
  let activeIndex=0;
  let prevIndex=0;
  const theme = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark':'light';
  document.body.dataset.theme=theme;

  const shell=document.getElementById('shell');
  const tabLayer=document.getElementById('tabLayer');
  const scrollZone=document.getElementById('scrollZone');
  const iframe=document.getElementById('contentFrame');
  const stackTitle=document.getElementById('stackTitle');

  const lerp=(a,b,t)=>a+(b-a)*t;
  const clamp=(v,lo,hi)=>Math.max(lo,Math.min(hi,v));

  function resolveBg(tab){
    return (tab.bg && (tab.bg[theme]||tab.bg.light)) || '#3a5f47';
  }

  /* ---------- layout ---------- */
  function computeLayout(){
    const L=manifest.layout;
    const n=manifest.tabs.length;
    const vw=shell.clientWidth, vh=shell.clientHeight;
    const edgeMargin=18;
    const titleOffset=46;
    const availW=vw-edgeMargin*2;

    // dynamic overlap: fits header+footer stacks into whatever room is left
    // for the *deepest* current stack, clamped between "always clickable"
    // and "always overlapping enough to read as a stack".
    const headerCount=activeIndex+1;
    const footerCount=n-1-activeIndex;
    const deepest=Math.max(headerCount,footerCount,1);
    const minContentWell=120; // never squeeze the iframe well below this
    const sideBudget=(vh-titleOffset-minContentWell)/2;
    const idealOverlap=L.rowHeight-(sideBudget/deepest);

    // minVisiblePx guarantees a clickable sliver -> caps overlap from above.
    // minOverlapPx guarantees the stacked/dimensional look -> floors overlap from below.
    const hardMaxOverlap=L.rowHeight-L.minVisiblePx;
    const finalOverlap=clamp(idealOverlap, L.minOverlapPx, hardMaxOverlap);
    const step=L.rowHeight-finalOverlap;

    const positions={left:0, center:.5, right:1};

    const layout=manifest.tabs.map((tab,i)=>{
      const t = n>1 ? i/(n-1) : 1;
      const width = availW*lerp(L.minWidthPct,L.maxWidthPct,t);
      const anchorFrac=positions[tab.position] ?? .5;
      const anchorX=edgeMargin+anchorFrac*availW;
      const x=clamp(anchorX-width/2, edgeMargin, vw-edgeMargin-width);

      let y;
      if(i<=activeIndex){
        // header stack, sequence order top-down
        y=titleOffset + i*step;
      }else{
        // footer stack, sequence order top-down within the footer block
        const j=i-(activeIndex+1);
        const blockH=(footerCount-1)*step + L.rowHeight;
        const blockTop=vh-blockH;
        y=blockTop + j*step;
      }

      const distFromSource=Math.abs(i-prevIndex);
      const delayMs=Math.min(distFromSource,8)*L.staggerStepMs;

      return {tab,i,x,y,width,zIndex:i,delayMs};
    });

    const headerBottom = titleOffset + activeIndex*step + L.rowHeight;
    const footerBlockH = footerCount>0 ? (footerCount-1)*step + L.rowHeight : 0;

    return {layout, headerBottom, footerBlockH, vw, vh, deepestGutter: edgeMargin + (n>1?0:0)};
  }

  /* ---------- render ---------- */
  let tabEls=[];

  function buildTabEls(){
    tabLayer.innerHTML='';
    tabEls=manifest.tabs.map((tab,i)=>{
      const el=document.createElement('div');
      el.className='tab';
      el.dataset.index=i;

      const ns='http://www.w3.org/2000/svg';
      const svg=document.createElementNS(ns,'svg');
      const path=document.createElementNS(ns,'path');
      svg.appendChild(path);
      el.appendChild(svg);

      const h2=document.createElement('h2');
      h2.textContent=tab.label;
      el.appendChild(h2);

      el.addEventListener('click',()=>setActive(i));
      tabLayer.appendChild(el);
      return {el,svg,path,h2};
    });
  }

  function paint(){
    const L=manifest.layout;
    const {layout,headerBottom,footerBlockH}=computeLayout();
    const line = manifest.displayMode==='line';

    stackTitle.textContent=manifest.title||'';

    layout.forEach(({tab,i,x,y,width,zIndex,delayMs})=>{
      const {el,svg,path,h2}=tabEls[i];
      el.style.setProperty('--row-h', L.rowHeight+'px');
      el.style.setProperty('--delay', delayMs+'ms');
      el.style.width=width+'px';
      el.style.zIndex=zIndex;
      el.style.transform=`translate(${x}px, ${y}px)`;
      el.classList.toggle('is-active', i===activeIndex);

      const leanPx=L.rowHeight*Math.tan(L.flapAngleDeg*Math.PI/180);
      const d=tabPath(width, L.rowHeight, leanPx, L.cornerRadiusPx);
      path.setAttribute('d',d);
      path.setAttribute('class', line?'tab-stroke':'tab-fill');

      const bg=resolveBg(tab);
      if(line){
        path.setAttribute('fill','none');
        path.setAttribute('stroke',bg);
        path.setAttribute('stroke-width','1.6');
        path.setAttribute('stroke-linejoin','round');
        path.style.filter='url(#handDrawn)';
        svg.style.filter='none';
        h2.style.color=bg;
        h2.style.opacity='.92';
      }else{
        path.setAttribute('fill',bg);
        path.removeAttribute('stroke');
        path.style.filter='none';
        svg.style.filter='drop-shadow(3px 5px 5px rgba(0,0,0,.28))';
        h2.style.color= theme==='dark' ? '#1b211c' : '#fbfaf6';
        h2.style.opacity='1';
      }
    });

    scrollZone.style.top=headerBottom+'px';
    scrollZone.style.bottom=footerBlockH+'px';
  }

  function setActive(i){
    if(i===activeIndex) return;
    prevIndex=activeIndex;
    activeIndex=i;
    paint();
    loadActiveFrame();
  }

  /* ---------- iframe height sync (same-origin) ---------- */
  let ro=null;
  function resizeFrame(){
    try{
      const doc=iframe.contentWindow.document;
      iframe.style.height=doc.documentElement.scrollHeight+'px';
    }catch(e){ /* ignore during navigation */ }
  }
  function loadActiveFrame(){
    const tab=manifest.tabs[activeIndex];
    iframe.src=tab.url;
    iframe.onload=()=>{
      resizeFrame();
      if(ro) ro.disconnect();
      ro=new ResizeObserver(resizeFrame);
      try{ ro.observe(iframe.contentWindow.document.body); }catch(e){}
    };
  }

  /* ---------- boot ---------- */
  fetch('manifest.json').then(r=>r.json()).then(m=>{
    manifest=m;
    buildTabEls();
    paint();
    loadActiveFrame();
  });

  window.addEventListener('resize',()=>{ if(manifest) paint(); });

})();
</script>
</body>
</html>
